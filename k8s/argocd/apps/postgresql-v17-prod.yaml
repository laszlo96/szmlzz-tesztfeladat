# Csak migráció idején aktiválni – prod only
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-cluster-v17-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cluster
    targetRevision: "0.3.0"
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/your-org/your-repo/HEAD/k8s/argocd/values/prod/postgresql-v17.yaml
  destination:
    server: https://prod.eks.example.com
    namespace: cnpg-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
