replicaCount: 2
springProfile: staging

image:
  repository: <ecr-registry>/image-processor
  tag: latest

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
  targetMemory: 80

ingress:
  enabled: true
  host: image-processor.staging.example.com

kafka:
  bootstrapServers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
  topic: image-jobs-staging
  groupId: image-processor-staging

redis:
  master: mymaster
  sentinels: redis-sentinel.redis.svc.cluster.local:26379

db:
  host: cnpg-cluster-rw.cnpg-staging.svc.cluster.local
  name: imageprocessor
  user: imageprocessor

s3:
  bucket: image-processor-staging

aws:
  region: eu-central-1

serviceAccount:
  iamRoleArn: arn:aws:iam::123456789:role/image-processor-staging
