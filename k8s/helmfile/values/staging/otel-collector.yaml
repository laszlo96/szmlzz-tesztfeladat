mode: daemonset

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/otel-collector-staging

config:
  receivers:
    filelog:
      include:
        - /var/log/containers/*.log
      exclude:
        - /var/log/containers/otel-collector*.log
      operators:
        - type: json_parser
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        - type: move
          from: attributes.log
          to: body
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: kube-state-metrics
            scrape_interval: 30s
            static_configs:
              - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]
          - job_name: node-exporter
            scrape_interval: 30s
            static_configs:
              - targets: ["prometheus-node-exporter.monitoring.svc.cluster.local:9100"]
          - job_name: spring-actuator
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [java-app-staging]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
          - job_name: cnpg
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [cnpg-prod]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
                action: keep
                regex: .+

  processors:
    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.node.name
          - k8s.deployment.name
    batch:
      send_batch_size: 1000
      timeout: 5s
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    resource:
      attributes:
        - key: environment
          value: staging
          action: insert

  exporters:
    elasticsearch:
      endpoints:
        - https://OPENSEARCH_ENDPOINT
      auth:
        authenticator: sigv4auth
      logs_index: logs-%{k8s.namespace.name}-%Y.%m.%d
      traces_index: traces-%Y.%m.%d
      metrics_index: metrics-%Y.%m.%d

  extensions:
    sigv4auth:
      region: eu-central-1
      service: es
    health_check: {}
    memory_ballast:
      size_in_percentage: 40

  service:
    extensions: [sigv4auth, health_check, memory_ballast]
    pipelines:
      logs:
        receivers: [filelog, otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [elasticsearch]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [elasticsearch]
      metrics:
        receivers: [prometheus, otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [elasticsearch]

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

tolerations:
  - operator: Exists
